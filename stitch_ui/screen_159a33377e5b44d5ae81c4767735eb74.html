<body class="bg-surface min-h-screen text-on-surface antialiased flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#FCF9F8] dark:bg-stone-950 flex items-center justify-between px-6 py-4 w-full fixed top-0 z-50">
<div class="flex items-center gap-4">
<button class="text-[#C9A84C] hover:opacity-80 transition-opacity scale-95 duration-200 transition-transform">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-['Poppins'] font-semibold tracking-tight text-[#1C1B1B] dark:text-stone-100 text-lg">My Cart</h1>
</div>
<button class="text-[#C9A84C] hover:opacity-80 transition-opacity scale-95 duration-200 transition-transform">
<span class="material-symbols-outlined">shopping_bag</span>
</button>
</header>
<!-- Main Content Area -->
<main class="flex-1 pt-20 pb-64 px-6 max-w-[430px] mx-auto w-full">
<!-- Cart Items List -->
<div class="space-y-8">

<div class="group relative flex gap-6 items-start">

</div>
<div class="flex flex-col flex-1 py-1">
<div class="flex justify-between items-start">
<h3 class="font-['Poppins'] font-semibold text-on-secondary-fixed text-base tracking-tight">Classic White T-Shirt</h3>
<button class="text-tertiary hover:text-error transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
<p class="text-tertiary text-sm mt-1 uppercase tracking-widest font-medium">Size: M</p>
<div class="mt-auto flex justify-between items-center">
<span class="text-on-surface font-bold text-lg">$45.00</span>
<div class="flex items-center bg-surface-container rounded-full px-3 py-1 gap-4">
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[18px]">remove</span>
</button>
<span class="text-on-surface font-semibold text-sm">1</span>
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[18px]">add</span>
</button>
</div>
</div>
</div>
</div>
<!-- Item 2 -->
<div class="group relative flex gap-6 items-start">
<div class="w-32 h-40 bg-surface-container rounded-xl overflow-hidden flex-shrink-0">

</div>

<h3 class="font-['Poppins'] font-semibold text-on-secondary-fixed text-base tracking-tight">Premium Loafers</h3>
<button class="text-tertiary hover:text-error transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
<p class="text-tertiary text-sm mt-1 uppercase tracking-widest font-medium">Size: 42</p>

<div class="flex items-center bg-surface-container rounded-full px-3 py-1 gap-4">

<span class="material-symbols-outlined text-[18px]">remove</span>
</button>
<span class="text-on-surface font-semibold text-sm">1</span>
<button class="text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[18px]">add</span>
</button>
</div>
</div>
</div>
</div>
</div>
<!-- Promotional Banner (Digital Atelier Aesthetic) -->
<div class="mt-12 p-6 bg-primary-container/10 rounded-2xl flex items-center justify-between border border-primary-container/20">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary-container">loyalty</span>
<div>
<p class="font-['Poppins'] font-bold text-on-primary-container text-sm">Complimentary Shipping</p>

</div>
</div>
</div>

<div class="fixed bottom-0 left-0 w-full bg-surface/80 backdrop-blur-xl z-50 px-6 pt-6 pb-12 shadow-[0_-10px_40px_rgba(28,27,27,0.04)] rounded-t-[32px] max-w-[430px] left-1/2 -translate-x-1/2">
<div class="space-y-4 mb-8">
<div class="flex justify-between items-center">
<span class="text-tertiary font-medium text-sm">Subtotal</span>
<span class="text-on-surface font-semibold text-base">$230.00</span>
</div>
<div class="flex justify-between items-center">
<span class="text-tertiary font-medium text-sm">Delivery</span>
<span class="text-primary-container font-bold text-sm tracking-widest uppercase">Free</span>
</div>
<!-- Structural separation -->
<div class="h-px bg-surface-variant/30 w-full"></div>
<div class="flex justify-between items-center">
<span class="text-on-secondary-fixed font-bold text-lg">Total</span>
<span class="text-on-secondary-fixed font-['Poppins'] font-bold text-2xl">$230.00</span>
</div>
</div>
<button class="w-full bg-on-secondary-fixed text-white font-['Poppins'] font-bold py-5 rounded-full tracking-[0.1em] text-sm hover:opacity-90 active:scale-[0.98] transition-all uppercase shadow-lg shadow-on-secondary-fixed/20">
            CHECKOUT
        </button>
</div>

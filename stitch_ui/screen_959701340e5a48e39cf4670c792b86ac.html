<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register - StyleMart</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#464747",
                        "outline": "#7e7665",
                        "primary-container": "#c9a84c",
                        "secondary-fixed-dim": "#c6c4df",
                        "on-error": "#ffffff",
                        "surface-container-low": "#f6f3f2",
                        "tertiary-fixed": "#e3e2e2",
                        "primary": "#755b00",
                        "primary-fixed": "#ffe08f",
                        "secondary-container": "#e2e0fc",
                        "on-tertiary-fixed": "#1b1c1c",
                        "tertiary": "#5e5e5e",
                        "on-tertiary": "#ffffff",
                        "surface-container-highest": "#e5e2e1",
                        "primary-fixed-dim": "#e6c364",
                        "inverse-surface": "#313030",
                        "on-primary": "#ffffff",
                        "surface-variant": "#e5e2e1",
                        "on-primary-fixed": "#241a00",
                        "tertiary-fixed-dim": "#c7c6c6",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#d0c5b2",
                        "surface-tint": "#755b00",
                        "tertiary-container": "#acabab",
                        "surface": "#fcf9f8",
                        "on-secondary-container": "#63627a",
                        "surface-dim": "#dcd9d9",
                        "on-surface": "#1c1b1b",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#eae7e7",
                        "on-primary-fixed-variant": "#584400",
                        "inverse-on-surface": "#f3f0ef",
                        "error": "#ba1a1a",
                        "secondary": "#5d5c74",
                        "inverse-primary": "#e6c364",
                        "on-tertiary-container": "#3f4040",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff",
                        "surface-container": "#f0eded",
                        "on-secondary-fixed-variant": "#45455b",
                        "background": "#fcf9f8",
                        "surface-bright": "#fcf9f8",
                        "on-secondary-fixed": "#1a1a2e",
                        "on-primary-container": "#503d00",
                        "on-surface-variant": "#4d4637",
                        "on-background": "#1c1b1b",
                        "secondary-fixed": "#e2e0fc"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Poppins"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3 { font-family: 'Poppins', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Lock dimensions for iPhone 14 Pro */
        .iphone-14-pro-canvas {
            width: 393px;
            height: 852px;
            overflow: hidden;
            position: relative;
        }
    </style>
</head>
<body class="bg-surface text-on-surface flex items-center justify-center min-h-screen">
<div class="iphone-14-pro-canvas bg-surface flex flex-col px-6 pt-8 pb-10">
<!-- Navigation Header -->
<header class="flex items-center justify-between mb-8">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<div class="text-xl font-bold tracking-tight text-on-secondary-fixed">
<h1 class="text-2xl font-bold tracking-[0.3em] text-[#1A1A2E] font-headline" style="font-family: 'Plus Jakarta Sans';">StyleMart</h1>
</div>
<div class="w-10"></div> <!-- Spacer -->
</header>
<!-- Main Content -->
<main class="flex-grow flex flex-col">
<div class="mb-8">
<h1 class="text-[32px] font-bold text-on-secondary-fixed leading-tight mb-1">Create Account</h1>
<p class="text-tertiary text-sm">Join StyleMart today</p>
</div>
<!-- Registration Form -->
<form class="space-y-5">
<!-- Name Field -->
<div class="relative group">
<label class="block text-[10px] uppercase tracking-widest font-semibold text-tertiary mb-1.5 ml-1">Full Name</label>
<input class="w-full h-12 px-4 rounded-xl bg-surface-container-lowest border border-outline-variant/30 focus:border-primary focus:ring-0 transition-all outline-none text-on-surface placeholder:text-tertiary/40 text-sm" placeholder="Enter your full name" type="text"/>
</div>
<!-- Email Field -->
<div class="relative group">
<label class="block text-[10px] uppercase tracking-widest font-semibold text-tertiary mb-1.5 ml-1">Email</label>
<input class="w-full h-12 px-4 rounded-xl bg-surface-container-lowest border border-outline-variant/30 focus:border-primary focus:ring-0 transition-all outline-none text-on-surface placeholder:text-tertiary/40 text-sm" placeholder="hello@example.com" type="email"/>
</div>
<!-- Password Field -->
<div class="relative group">
<label class="block text-[10px] uppercase tracking-widest font-semibold text-tertiary mb-1.5 ml-1">Password</label>
<div class="relative">
<input class="w-full h-12 px-4 pr-12 rounded-xl bg-surface-container-lowest border border-outline-variant/30 focus:border-primary focus:ring-0 transition-all outline-none text-on-surface placeholder:text-tertiary/40 text-sm" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-tertiary/60 hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="relative group">
<label class="block text-[10px] uppercase tracking-widest font-semibold text-tertiary mb-1.5 ml-1">Confirm Password</label>
<input class="w-full h-12 px-4 rounded-xl bg-surface-container-lowest border border-outline-variant/30 focus:border-primary focus:ring-0 transition-all outline-none text-on-surface placeholder:text-tertiary/40 text-sm" placeholder="••••••••" type="password"/>
</div>
<!-- CTA Button -->
<div class="pt-4">
<button class="w-full h-14 bg-on-secondary-fixed text-surface rounded-full font-semibold text-base flex items-center justify-center gap-2 active:scale-[0.98] transition-transform shadow-[0_8px_24px_rgba(26,26,46,0.12)]" type="submit">
                        Create Account
                    </button>
</div>
</form>
</main>
<!-- Footer Link -->
<footer class="mt-auto pt-6 text-center">
<p class="text-tertiary text-sm">
                Already have an account? 
                <a class="text-on-secondary-fixed font-bold ml-1 hover:underline underline-offset-4 decoration-primary-container" href="#">Login</a>
</p>
</footer>
</div>
</body></html>

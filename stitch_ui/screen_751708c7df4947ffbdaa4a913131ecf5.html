<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface-container": "#f0eded",
                    "inverse-surface": "#313030",
                    "surface-bright": "#fcf9f8",
                    "secondary": "#5d5c74",
                    "outline-variant": "#d0c5b2",
                    "primary-fixed": "#ffe08f",
                    "surface-dim": "#dcd9d9",
                    "error": "#ba1a1a",
                    "on-primary-fixed": "#241a00",
                    "on-error": "#ffffff",
                    "on-tertiary-container": "#3f4040",
                    "surface-variant": "#e5e2e1",
                    "tertiary-fixed": "#e3e2e2",
                    "secondary-fixed": "#e2e0fc",
                    "on-tertiary": "#ffffff",
                    "surface-tint": "#755b00",
                    "on-primary-container": "#503d00",
                    "on-surface-variant": "#4d4637",
                    "on-primary-fixed-variant": "#584400",
                    "surface": "#fcf9f8",
                    "primary-container": "#c9a84c",
                    "tertiary-container": "#acabab",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-high": "#eae7e7",
                    "on-tertiary-fixed": "#1b1c1c",
                    "background": "#fcf9f8",
                    "surface-container-low": "#f6f3f2",
                    "on-secondary": "#ffffff",
                    "tertiary": "#5e5e5e",
                    "primary": "#755b00",
                    "on-background": "#1c1b1b",
                    "tertiary-fixed-dim": "#c7c6c6",
                    "on-secondary-fixed-variant": "#45455b",
                    "on-secondary-container": "#63627a",
                    "on-primary": "#ffffff",
                    "on-tertiary-fixed-variant": "#464747",
                    "on-secondary-fixed": "#1a1a2e",
                    "inverse-primary": "#e6c364",
                    "error-container": "#ffdad6",
                    "on-surface": "#1c1b1b",
                    "outline": "#7e7665",
                    "on-error-container": "#93000a",
                    "surface-container-highest": "#e5e2e1",
                    "primary-fixed-dim": "#e6c364",
                    "inverse-on-surface": "#f3f0ef",
                    "secondary-fixed-dim": "#c6c4df",
                    "secondary-container": "#e2e0fc"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        h1, h2, h3, .headline { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar suppression for clean mobile feel */
        ::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-start overflow-x-hidden">
<!-- iPhone 14 Pro Frame Simulation Container (390x844px context) -->
<div class="w-full max-w-[390px] min-h-screen bg-surface flex flex-col relative shadow-2xl overflow-hidden">
<!-- TopAppBar -->
<header class="bg-[#FCF9F8] flex items-center justify-between px-6 py-4 w-full sticky top-0 z-50">
<div class="flex items-center gap-4">
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-150">
<span class="material-symbols-outlined text-[#C9A84C]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-semibold text-[#1C1B1B] text-lg">Checkout</h1>
</div>
<div class="w-6"></div> <!-- Spacer for center-weighted feel -->
<div class="absolute bottom-0 left-0 right-0 bg-[#F0EDED] h-[1px]"></div>
</header>
<!-- Main Content Scrollable Area -->
<main class="flex-1 overflow-y-auto pb-40 px-6">
<!-- Progress Indicator -->
<section class="mt-8 mb-10">
<div class="flex items-center justify-between relative">
<!-- Progress Line Background -->
<div class="absolute top-1/2 left-0 w-full h-[2px] bg-surface-container -translate-y-1/2 z-0"></div>
<!-- Completed Progress Line -->
<div class="absolute top-1/2 left-0 w-1/2 h-[2px] bg-primary-container -translate-y-1/2 z-0"></div>
<!-- Step 1: Cart -->
<div class="relative z-10 flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-primary-container flex items-center justify-center text-white">
<span class="material-symbols-outlined text-sm" data-icon="check" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="text-[10px] font-bold uppercase tracking-wider text-primary">Cart</span>
</div>
<!-- Step 2: Shipping (Active) -->
<div class="relative z-10 flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-on-secondary-fixed flex items-center justify-center ring-4 ring-surface">
<div class="w-2 h-2 rounded-full bg-white"></div>
</div>
<span class="text-[10px] font-bold uppercase tracking-wider text-on-secondary-fixed">Shipping</span>
</div>
<!-- Step 3: Payment -->
<div class="relative z-10 flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-surface-container flex items-center justify-center ring-4 ring-surface">
<div class="w-2 h-2 rounded-full bg-tertiary"></div>
</div>
<span class="text-[10px] font-bold uppercase tracking-wider text-tertiary">Payment</span>
</div>
</div>
</section>
<!-- Delivery Details Section -->
<section class="space-y-6">
<div class="flex items-center justify-between">
<h2 class="headline text-xl font-bold tracking-tight text-on-secondary-fixed">Delivery Details</h2>
</div>
<div class="space-y-5">
<div class="relative group">
<label class="block text-[11px] font-bold uppercase tracking-[1px] text-tertiary mb-1 ml-1">Full Name</label>
<input class="w-full bg-surface-container-lowest border-none rounded-xl px-5 py-4 text-sm focus:ring-1 focus:ring-primary-container transition-all placeholder:text-tertiary/40" placeholder="Enter your name" type="text"/>
</div>
<div class="relative group">
<label class="block text-[11px] font-bold uppercase tracking-[1px] text-tertiary mb-1 ml-1">Phone Number</label>
<input class="w-full bg-surface-container-lowest border-none rounded-xl px-5 py-4 text-sm focus:ring-1 focus:ring-primary-container transition-all placeholder:text-tertiary/40" placeholder="+1 234 567 890" type="tel"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="relative group">
<label class="block text-[11px] font-bold uppercase tracking-[1px] text-tertiary mb-1 ml-1">City</label>
<input class="w-full bg-surface-container-lowest border-none rounded-xl px-5 py-4 text-sm focus:ring-1 focus:ring-primary-container transition-all placeholder:text-tertiary/40" placeholder="Select City" type="text"/>
</div>
<div class="relative group">
<label class="block text-[11px] font-bold uppercase tracking-[1px] text-tertiary mb-1 ml-1">Zip Code</label>
<input class="w-full bg-surface-container-lowest border-none rounded-xl px-5 py-4 text-sm focus:ring-1 focus:ring-primary-container transition-all placeholder:text-tertiary/40" placeholder="10001" type="text"/>
</div>
</div>
<div class="relative group">
<label class="block text-[11px] font-bold uppercase tracking-[1px] text-tertiary mb-1 ml-1">Address Line 1</label>
<input class="w-full bg-surface-container-lowest border-none rounded-xl px-5 py-4 text-sm focus:ring-1 focus:ring-primary-container transition-all placeholder:text-tertiary/40" placeholder="Street address, P.O. box" type="text"/>
</div>
</div>
</section>
<!-- Payment Method Section -->
<section class="mt-10 mb-10 space-y-4">
<h2 class="headline text-xl font-bold tracking-tight text-on-secondary-fixed">Payment Method</h2>
<div class="space-y-3">
<!-- Cash on Delivery (Active) -->
<div class="flex items-center justify-between p-5 bg-surface-container-lowest rounded-2xl border-2 border-primary-container/30">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-primary-container/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="payments">payments</span>
</div>
<span class="text-sm font-semibold text-on-secondary-fixed">Cash on Delivery</span>
</div>
<div class="w-6 h-6 rounded-full border-2 border-primary-container flex items-center justify-center p-1">
<div class="w-full h-full rounded-full bg-primary-container"></div>
</div>
</div>
<!-- Credit/Debit Card (Disabled) -->
<div class="flex items-center justify-between p-5 bg-surface-container-low/50 rounded-2xl opacity-60">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-tertiary/10 flex items-center justify-center text-tertiary">
<span class="material-symbols-outlined" data-icon="credit_card">credit_card</span>
</div>
<div>
<span class="text-sm font-semibold text-on-secondary-fixed block">Credit/Debit Card</span>
<span class="text-[10px] font-bold uppercase tracking-wider text-primary">Coming Soon</span>
</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-surface-container"></div>
</div>
</div>
</section>
<!-- Order Summary Section -->
<section class="bg-on-secondary-fixed p-6 rounded-[24px] text-white">
<h3 class="text-xs font-bold uppercase tracking-[2px] opacity-60 mb-4">Order Summary</h3>
<div class="space-y-3">
<div class="flex justify-between items-center">
<span class="text-sm opacity-80">Subtotal</span>
<span class="font-semibold">$230.00</span>
</div>
<div class="flex justify-between items-center">
<span class="text-sm opacity-80">Delivery</span>
<span class="text-primary-container font-bold text-xs tracking-wider">FREE</span>
</div>
<div class="pt-3 border-t border-white/10 mt-3 flex justify-between items-center">
<span class="text-lg font-bold">Total</span>
<span class="text-xl font-extrabold text-primary-container">$230.00</span>
</div>
</div>
</section>
</main>
<!-- Fixed Bottom Action Bar -->
<div class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[390px] z-50 flex flex-col items-center pb-safe">
<div class="w-full bg-[#FCF9F8]/80 backdrop-blur-md px-6 py-6 rounded-t-[30px] shadow-[0_-4px_40px_rgba(28,27,27,0.04)]">
<button class="w-full h-14 bg-gradient-to-r from-[#755B00] to-[#C9A84C] text-[#241A00] rounded-full flex items-center justify-center gap-3 group hover:scale-[1.02] transition-transform duration-300 active:scale-[0.98]">
<span class="font-['Inter'] font-bold tracking-[2px] uppercase text-xs">PLACE ORDER</span>
<span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</div>
</body></html>

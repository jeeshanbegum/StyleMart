<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-start">
<!-- Top 30%: Brand Header Area -->
<header class="w-full h-[265px] flex flex-col items-center justify-center text-center px-6 relative overflow-hidden">
<!-- Subtle glassmorphism background effect -->
<div class="absolute inset-0 z-0">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[80%] bg-primary-container/10 blur-[100px] rounded-full"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[80%] bg-on-secondary-fixed/5 blur-[100px] rounded-full"></div>
</div>
<div class="z-10 flex flex-col items-center">
<!-- Brand Logo from JSON Identity -->
<div class="mb-8">
<span class="text-3xl font-bold tracking-tight text-on-secondary-fixed font-headline" style=""><h1 class="text-2xl font-bold tracking-[0.3em] text-[#1A1A2E] dark:text-stone-100 font-headline cursor-text" spellcheck="false" data-stitch-added-classes="cursor-text" style="--tw-scale-x: 1; --tw-scale-y: 1; --tw-pan-x: ; --tw-pan-y: ; --tw-pinch-zoom: ; --tw-scroll-snap-strictness: proximity; --tw-gradient-from-position: ; --tw-gradient-via-position: ; --tw-gradient-to-position: ; --tw-ordinal: ; --tw-slashed-zero: ; --tw-numeric-figure: ; --tw-numeric-spacing: ; --tw-numeric-fraction: ; --tw-ring-inset: ; --tw-ring-offset-width: 0px; --tw-ring-offset-color: #fff; --tw-ring-color: rgb(59 130 246 / 0.5); --tw-ring-offset-shadow: 0 0 #0000; --tw-ring-shadow: 0 0 #0000; --tw-shadow: 0 0 #0000; --tw-shadow-colored: 0 0 #0000; --tw-blur: ; --tw-brightness: ; --tw-contrast: ; --tw-grayscale: ; --tw-hue-rotate: ; --tw-invert: ; --tw-saturate: ; --tw-sepia: ; --tw-drop-shadow: ; --tw-backdrop-blur: ; --tw-backdrop-brightness: ; --tw-backdrop-contrast: ; --tw-backdrop-grayscale: ; --tw-backdrop-hue-rotate: ; --tw-backdrop-invert: ; --tw-backdrop-opacity: ; --tw-backdrop-saturate: ; --tw-backdrop-sepia: ; --tw-contain-size: ; --tw-contain-layout: ; --tw-contain-paint: ; --tw-contain-style: ; font-size: 1.5rem; font-family: &quot;Plus Jakarta Sans&quot;; line-height: 2rem; letter-spacing: 0.3em; --tw-text-opacity: 1; text-align: start; outline: none !important;">StyleMart</h1></span>
</div>
<h1 class="text-[24px] font-bold text-on-surface font-headline mb-2" style="">Welcome Back 👋</h1>
<p class="text-[14px] text-tertiary font-body" style="">Sign in to continue</p>
</div>
</header>
<!-- Form Section -->
<main class="w-full max-w-md px-8 pb-12 flex-grow">
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="text-[12px] font-semibold text-on-surface uppercase tracking-widest ml-1" for="email" style="">Email Address</label>
<div class="relative">
<input class="w-full px-5 py-4 bg-surface-container rounded-xl border-none focus:ring-2 focus:ring-primary-container transition-all text-on-surface placeholder:text-tertiary/50" id="email" name="email" placeholder="alex@example.com" type="email">
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-[12px] font-semibold text-on-surface uppercase tracking-widest" for="password" style="">Password</label>
<a class="text-[12px] font-semibold text-primary-container hover:underline transition-all" href="#" style="">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full px-5 py-4 bg-surface-container rounded-xl border-none focus:ring-2 focus:ring-primary-container transition-all text-on-surface placeholder:text-tertiary/50" id="password" name="password" placeholder="••••••••" type="password">
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-tertiary" type="button" style="">
<span class="material-symbols-outlined text-[20px]" style="">visibility_off</span>
</button>
</div>
</div>
<!-- Primary Login Button -->
<button class="w-full py-4 bg-on-secondary-fixed text-white font-bold rounded-full hover:scale-[1.02] active:scale-[0.98] transition-transform duration-150 shadow-lg shadow-on-secondary-fixed/10 mt-4" type="submit" style="">
                Login
            </button>
<!-- Divider -->
<div class="flex items-center gap-4 py-4">
<div class="h-[1px] flex-grow bg-surface-container-highest"></div>
<span class="text-[12px] text-tertiary uppercase tracking-widest font-medium" style="">Or</span>
<div class="h-[1px] flex-grow bg-surface-container-highest"></div>
</div>
<!-- Google Sign In -->
<button class="w-full py-4 bg-transparent border border-outline-variant/30 text-on-surface font-semibold rounded-full flex items-center justify-center gap-3 hover:bg-surface-container-low transition-colors" type="button" style="">
<img alt="" class="w-5 h-5" data-alt="Google colorful G logo icon on a transparent background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAARnCRNxZ-xc8hNRLiiJb6wLapgbBNf6AVq21sOZ_hHdxOK-ycmgoe9GNy2gop6toUWZvzpq3IPSbnPsnAnxIloV3HMR4a4cvVaFWlfXxpYI5oBveHRLJWhjVn3WT32vMfNPwIB5spZvnsuV9vwJX_wMc9VMdhcJ3PKPgIt1DriPr76b3KnnTMLW4kxsAtWzpT5knqc-e_jXLuoVTd53KkXpas8Ns9xtdHZzj6zVo-vqkWaBGra_7LYa0Fv6LXyblIFAd79-gScw" style="">
                Sign in with Google
            </button>
</form>
<!-- Footer Link -->
<div class="mt-12 text-center">
<p class="text-[14px] text-tertiary" style="">
                Don't have an account? 
                <a class="text-on-secondary-fixed font-bold ml-1 hover:text-primary-container transition-colors" href="#" style="">Register</a>
</p>
</div>
</main>
<!-- Bottom Aesthetic Detail (Editorial Line) -->
<footer class="w-full flex justify-center pb-8">
<div class="w-12 h-1 bg-surface-container-highest rounded-full"></div>
</footer>
</body></html>
